# Default screen parameters. Override any of these on the CLI (e.g. --min-dte 25).

# Annual risk-free rate used for Black-Scholes delta / probability (e.g. 3-month T-bill).
risk_free_rate: 0.04

# Minimum market cap (stocks) or assets under management (ETFs), in USD.
min_market_cap: 1_000_000_000

# Days-to-expiry window to consider.
min_dte: 20
max_dte: 50

# How far out of the money, as a fraction of spot. 0.02 = 2% above spot, 0.15 = 15% above.
min_otm: 0.02
max_otm: 0.15

# Liquidity filters — contracts failing any of these are dropped.
min_open_interest: 50
min_volume: 1
max_spread_pct: 0.15        # (ask - bid) / mid

# Trailing window (trading days) for realized/historical volatility.
hv_window: 30

# How many ranked rows the screener keeps.
top: 40

# --- Simulation drift (expected_return.py) -------------------------------------
# How `simulate` sets the real-world drift when you don't pass --drift.
#   fixed       -> flat market baseline (risk_free_rate + equity_risk_premium)
#   fundamental -> Grinold-Kroner: dividend yield + earnings growth + P/E reversion
#   analyst     -> annualized mean-analyst-target-implied return
#   blend       -> average of fundamental and analyst
drift_model: fundamental
equity_risk_premium: 0.045   # baseline equity premium over the risk-free rate
pe_anchor:                   # blank -> PEG=1 (anchor ~ 100*growth) / market default
pe_reversion_years: 5.0      # horizon over which P/E reverts to the anchor
pe_reversion_shrink: 1.0     # 0..1 weight on the valuation-reversion term
